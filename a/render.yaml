services:
  - type: web
    name: accountesy
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      npm install
      npm run build
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - fromEnv:
          - SUPABASE_URL
          - SUPABASE_KEY
          - SUPABASE_SERVICE_KEY
          - SECRET_KEY
          - ALGORITHM
          - ACCESS_TOKEN_EXPIRE_MINUTES
          - VITE_SUPABASE_URL
          - VITE_SUPABASE_ANON_KEY
          - VITE_API_URL
    disk:
      name: accountesy-disk
      mountPath: /app/static
      sizeGB: 10
