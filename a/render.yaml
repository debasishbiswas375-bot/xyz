services:
  # FastAPI Backend Service
  - type: web
    name: accountesy-api
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
    autoDeploy: true
    
  # Frontend Build (will be served by FastAPI)
  - type: build
    name: accountesy-frontend
    runtime: node
    plan: free
    buildCommand: "npm install && npm run build"
    buildEnvVars:
      - key: NODE_VERSION
        value: "18"
    autoDeploy: true
